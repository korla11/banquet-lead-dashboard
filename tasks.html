<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>任务列表 · 盛世礼宴小宴会</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0a09;
            --panel: rgba(28, 25, 23, 0.9);
            --border: rgba(212, 175, 55, 0.22);
            --gold: #d4af37;
            --gold-light: #f3d27c;
            --text: #fafaf9;
            --muted: #a8a29e;
        }

        * { box-sizing: border-box; }

        html, body {
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 8% 5%, rgba(212, 175, 55, 0.12), transparent 28rem),
                radial-gradient(circle at 92% 95%, rgba(120, 85, 30, 0.1), transparent 30rem),
                var(--bg);
            font-family: "Outfit", "Noto Sans SC", sans-serif;
        }

        button { font: inherit; }

        .page {
            width: min(1050px, calc(100% - 40px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .top-actions {
            margin-bottom: 18px;
        }

        .back-button {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 10px 18px;
            color: #17130b;
            text-decoration: none;
            border: 1px solid #f0ce75;
            border-radius: 12px;
            background: linear-gradient(135deg, #f3d27c, #cfa93c);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.2);
            font-weight: 700;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 22px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
        }

        .subtitle {
            margin: 7px 0 0;
            color: var(--muted);
        }

        .status {
            padding: 9px 14px;
            color: var(--gold-light);
            white-space: nowrap;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(212, 175, 55, 0.06);
            font-size: 0.84rem;
        }

        .task-shell {
            padding: 22px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--panel);
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.3);
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-button {
            min-height: 48px;
            padding: 10px 15px;
            color: var(--muted);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
        }

        .tab-button.active {
            color: #17130b;
            border-color: var(--gold);
            background: linear-gradient(135deg, var(--gold-light), #cfa93c);
            font-weight: 700;
        }

        .overall {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 18px;
            padding: 15px 17px;
            border: 1px solid rgba(212, 175, 55, 0.16);
            border-radius: 14px;
            background: rgba(212, 175, 55, 0.045);
        }

        .overall-label {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .overall-value {
            margin-top: 3px;
            color: var(--gold-light);
            font-size: 1.35rem;
            font-weight: 700;
        }

        .overall-rate {
            color: var(--gold-light);
            font-size: 1.55rem;
            font-weight: 700;
        }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 13px;
        }

        .task-card {
            min-width: 0;
            padding: 17px;
            border: 1px solid rgba(255, 255, 255, 0.065);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.025);
        }

        .task-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .task-name {
            font-weight: 700;
        }

        .task-numbers {
            color: var(--gold-light);
            white-space: nowrap;
            font-size: 0.88rem;
            font-weight: 650;
        }

        .progress-track {
            height: 9px;
            margin-top: 15px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
        }

        .progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #9a7725, var(--gold-light));
            box-shadow: 0 0 14px rgba(212, 175, 55, 0.25);
        }

        .task-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            color: var(--muted);
            font-size: 0.76rem;
        }

        .task-rate {
            color: var(--gold-light);
        }

        .empty, .error {
            padding: 38px 12px;
            color: var(--muted);
            text-align: center;
        }

        .error { color: #fca5a5; }

        @media (max-width: 720px) {
            .page {
                width: min(100% - 24px, 620px);
                padding-top: 20px;
            }

            .page-header {
                align-items: flex-start;
                flex-direction: column;
                gap: 12px;
            }

            .task-shell {
                padding: 14px 12px;
            }

            .task-grid {
                grid-template-columns: 1fr;
                gap: 9px;
            }

            .task-card {
                padding: 14px;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <div class="top-actions">
        <a class="back-button" href="index.html" onclick="prepareAllDataReturn()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <span>返回所有数据</span>
        </a>
    </div>

    <header class="page-header">
        <div>
            <h1>任务列表</h1>
            <p class="subtitle">销售个人与部门任务实时进度</p>
        </div>
        <div class="status" id="data-status">正在读取实时数据…</div>
    </header>

    <section class="task-shell">
        <div class="tabs">
            <button class="tab-button active" type="button" data-tab="sales">销售个人任务</button>
            <button class="tab-button" type="button" data-tab="dept">部门任务</button>
        </div>

        <div class="overall">
            <div>
                <div class="overall-label" id="overall-label">销售个人任务汇总</div>
                <div class="overall-value" id="overall-value">- / - 单</div>
            </div>
            <div class="overall-rate" id="overall-rate">-%</div>
        </div>

        <div class="task-grid" id="task-grid">
            <div class="empty">正在加载任务数据…</div>
        </div>
    </section>
</main>

<script>
    const RETURN_SESSION_KEY = 'banquet_logged_in_user';
    const TARGET_CONFIG = {
        sales: {
            '李冰冰': { target: 100, label: '李冰冰（销售）' },
            '冯玲': { target: 100, label: '冯玲（销售）' },
            '郭楠': { target: 100, label: '郭楠（销售）' },
            '张议丹': { target: 100, label: '张议丹（销售）' },
            '徐俊强': { target: 100, label: '徐俊强（销售）' }
        },
        dept: {
            '统筹': { target: 10, label: '统筹部门' },
            '灯光': { target: 10, label: '灯光部门' },
            '前厅': { target: 50, label: '前厅部门' },
            '后厨': { target: 50, label: '后厨部门' },
            '行政': { target: 40, label: '行政部门' }
        }
    };
    const OWNER_ALIAS_MAP = {
        '冰冰': '李冰冰',
        '李冰冰': '李冰冰',
        '冯玲': '冯玲',
        '郭楠': '郭楠',
        '张议丹': '张议丹',
        '丹丹': '张议丹',
        '徐俊强': '徐俊强'
    };

    let activeTab = 'sales';
    let taskRecords = [];

    function prepareAllDataReturn() {
        if (!sessionStorage.getItem(RETURN_SESSION_KEY)) {
            sessionStorage.setItem(RETURN_SESSION_KEY, '全部数据（只读）');
        }
    }

    function calculateCompletions() {
        const completions = {};
        Object.keys(TARGET_CONFIG.sales).forEach(name => completions[name] = 0);
        Object.keys(TARGET_CONFIG.dept).forEach(name => completions[name] = 0);
        taskRecords.forEach(record => {
            const owner = String(record.owner || '').trim();
            const mappedOwner = OWNER_ALIAS_MAP[owner] || owner;
            if (mappedOwner in completions) completions[mappedOwner] += 1;
        });
        return completions;
    }

    function renderTasks() {
        const config = TARGET_CONFIG[activeTab];
        const completions = calculateCompletions();
        const entries = Object.entries(config);
        const completedTotal = entries.reduce((sum, [name]) => sum + (completions[name] || 0), 0);
        const targetTotal = entries.reduce((sum, [, info]) => sum + info.target, 0);
        const overallRate = targetTotal ? Math.round((completedTotal / targetTotal) * 100) : 0;

        document.getElementById('overall-label').textContent = activeTab === 'sales' ? '销售个人任务汇总' : '部门任务汇总';
        document.getElementById('overall-value').textContent = `${completedTotal} / ${targetTotal} 单`;
        document.getElementById('overall-rate').textContent = `${overallRate}%`;
        document.getElementById('task-grid').innerHTML = entries.map(([name, info]) => {
            const completed = completions[name] || 0;
            const rate = info.target ? Math.round((completed / info.target) * 100) : 0;
            const visualRate = Math.min(100, rate);
            return `<article class="task-card">
                <div class="task-card-header">
                    <div class="task-name">${info.label}</div>
                    <div class="task-numbers">${completed} / ${info.target} 单</div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style="width:${visualRate}%"></div>
                </div>
                <div class="task-footer">
                    <span>当前完成进度</span>
                    <span class="task-rate">${rate}%</span>
                </div>
            </article>`;
        }).join('');
    }

    document.querySelector('.tabs').addEventListener('click', event => {
        const button = event.target.closest('[data-tab]');
        if (!button) return;
        activeTab = button.dataset.tab;
        document.querySelectorAll('[data-tab]').forEach(item => item.classList.toggle('active', item === button));
        renderTasks();
    });

    async function loadTasks() {
        const status = document.getElementById('data-status');
        try {
            const response = await fetch('/api/data', { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            if (!result.success || !Array.isArray(result.records)) throw new Error('数据格式不正确');
            taskRecords = result.records;
            renderTasks();
            status.textContent = `实时数据 · ${taskRecords.length} 条记录`;
        } catch (error) {
            console.error('任务数据读取失败：', error);
            status.textContent = '数据读取失败，请稍后刷新';
            document.getElementById('task-grid').innerHTML = '<div class="error">暂时无法读取任务数据</div>';
        }
    }

    loadTasks();
</script>
</body>
</html>
