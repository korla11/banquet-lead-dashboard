<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        (() => {
            let activeTheme = null;
            const applyTimeTheme = () => {
                const hour = new Date().getHours();
                const nextTheme = hour >= 6 && hour < 18 ? 'day' : 'night';
                if (activeTheme && activeTheme !== nextTheme) window.location.reload();
                activeTheme = nextTheme;
                document.documentElement.dataset.theme = nextTheme;
            };
            applyTimeTheme();
            window.setInterval(applyTimeTheme, 60000);
        })();
    </script>
    <title>盛世礼宴小宴会客资管理看板</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chart.js Datalabels Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

    <style>
        :root {
            --bg-color: #0c0a09;
            --card-bg: rgba(28, 25, 23, 0.7);
            --card-border: rgba(212, 175, 55, 0.15);
            --card-border-hover: rgba(212, 175, 55, 0.35);
            --text-primary: #fafaf9;
            --text-secondary: #a8a29e;
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --gold-glow: rgba(212, 175, 55, 0.25);
            --success: #10b981;
            --danger: #ef4444;
            --font-family: 'Outfit', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html[data-theme="day"] {
            --bg-color: #f4f1ea;
            --card-bg: rgba(255, 255, 255, 0.92);
            --card-border: rgba(154, 111, 0, 0.22);
            --card-border-hover: rgba(154, 111, 0, 0.48);
            --text-primary: #1c1917;
            --text-secondary: #57534e;
            --gold: #b88713;
            --gold-light: #8a6508;
            --gold-glow: rgba(184, 135, 19, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            max-width: 100%;
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(212, 175, 55, 0.06) 0%, transparent 35%),
                radial-gradient(circle at 95% 95%, rgba(179, 143, 77, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: var(--font-family);
            min-height: 100vh;
            padding: 2.5rem 2rem;
            line-height: 1.6;
        }

        html[data-theme="day"] body {
            background-image:
                radial-gradient(circle at 5% 5%, rgba(212, 175, 55, 0.13) 0%, transparent 35%),
                radial-gradient(circle at 95% 95%, rgba(179, 143, 77, 0.1) 0%, transparent 40%);
        }

        html[data-theme="day"] .header-title h1,
        html[data-theme="day"] .kpi-info .kpi-value {
            background: linear-gradient(135deg, #1c1917 35%, #8a6508 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        html[data-theme="day"] .search-input,
        html[data-theme="day"] .select-input,
        html[data-theme="day"] .date-input,
        html[data-theme="day"] .filter-btn {
            color: #1c1917;
            border-color: rgba(120, 113, 108, 0.24);
            background: rgba(255, 255, 255, 0.84);
        }

        html[data-theme="day"] .login-overlay {
            background: rgba(244, 241, 234, 0.94);
        }

        html[data-theme="day"] .table-responsive {
            border-color: #ded8ca;
            background: #ffffff;
        }

        html[data-theme="day"] th {
            color: #57534e;
            border-bottom-color: #ded8ca;
            background: #f5f2eb;
        }

        html[data-theme="day"] .main-row {
            background: #ffffff !important;
            border-color: #e7e1d5;
        }

        html[data-theme="day"] .main-row td {
            color: #1c1917;
            border-bottom-color: #e7e1d5;
            background: #ffffff;
        }

        html[data-theme="day"] .main-row:hover td,
        html[data-theme="day"] .main-row:active {
            background: #fff8e7 !important;
        }

        html[data-theme="day"] .table-summary-row td,
        html[data-theme="day"] .detail-cell,
        html[data-theme="day"] .detail-grid {
            color: #1c1917;
            border-color: #ded8ca;
            background: #faf8f3;
        }

        html[data-theme="day"] .modal-overlay {
            background: rgba(231, 229, 228, 0.78);
        }

        html[data-theme="day"] .modal-card {
            color: #1c1917;
            border-color: rgba(184, 135, 19, 0.5);
            background: #ffffff;
            box-shadow: 0 18px 55px rgba(68, 64, 60, 0.2);
        }

        html[data-theme="day"] .modal-header,
        html[data-theme="day"] .modal-footer {
            border-color: #e7e1d5;
            background: #faf8f3;
        }

        html[data-theme="day"] .modal-body,
        html[data-theme="day"] .modal-body label {
            color: #292524;
            background: #ffffff;
        }

        html[data-theme="day"] .modal-card .search-input,
        html[data-theme="day"] .modal-card .select-input,
        html[data-theme="day"] .modal-card .date-input,
        html[data-theme="day"] .modal-card textarea {
            color: #1c1917;
            border-color: #d6d3d1;
            background-color: #ffffff;
        }

        html[data-theme="day"] .modal-card .select-input:focus,
        html[data-theme="day"] .modal-card .search-input:focus,
        html[data-theme="day"] .modal-card .date-input:focus {
            color: #1c1917;
            background-color: #fffdf8;
        }

        html[data-theme="day"] .select-input option,
        html[data-theme="day"] .page-size-select option {
            color: #1c1917;
            background: #ffffff;
        }

        html[data-theme="day"] .btn-secondary {
            color: #57534e;
            border-color: #d6d3d1;
            background: #ffffff;
        }

        /* Container */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 1.75rem 2.25rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .header-title h1 {
            font-size: 1.85rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--gold-light) 60%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.35rem;
            letter-spacing: 0.5px;
        }

        .header-title p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-title p::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--gold);
        }

        /* Filter Section */
        .filters-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 1.5rem 2.25rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.4);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 0.925rem;
            color: var(--text-secondary);
            font-weight: 600;
            min-width: 90px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .filter-options {
            display: flex;
            gap: 0.65rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            padding: 0.55rem 1.4rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .filter-btn:hover {
            background: rgba(212, 175, 55, 0.05);
            color: var(--text-primary);
            border-color: rgba(212, 175, 55, 0.25);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--gold) 0%, #b38f4d 100%);
            border-color: var(--gold);
            color: #000;
            font-weight: 600;
            box-shadow: 0 0 15px var(--gold-glow);
        }

        /* KPI Cards Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 1.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.35);
            transition: var(--transition);
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            border-color: var(--card-border-hover);
            box-shadow: 0 15px 45px 0 rgba(212, 175, 55, 0.1);
        }

        .kpi-action-card {
            width: 100%;
            min-width: 0;
            color: inherit;
            font: inherit;
            text-align: left;
            text-decoration: none;
            cursor: pointer;
            appearance: none;
        }

        .kpi-card.kpi-action-card .kpi-value {
            font-size: 1.65rem;
        }

        .kpi-action-card[aria-expanded="true"] {
            border-color: rgba(212, 175, 55, 0.55);
            background: rgba(212, 175, 55, 0.1);
        }

        .kpi-info h3 {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 0.65rem;
            letter-spacing: 0.5px;
        }

        .kpi-info .kpi-value {
            font-size: 2.15rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fff 40%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kpi-info .kpi-subtext {
            font-size: 0.775rem;
            color: var(--text-secondary);
            margin-top: 0.35rem;
        }

        .kpi-icon-box {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(212, 175, 55, 0.08);
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.05);
        }

        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1.25fr;
            gap: 1.5rem;
        }

        @media (max-width: 968px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 1.75rem;
            box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            height: 420px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .chart-header h2 {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            border-left: 3px solid var(--gold);
            padding-left: 0.75rem;
        }

        .chart-container {
            position: relative;
            flex: 1;
            width: 100%;
            height: 100%;
            min-height: 0;
        }

        /* Data Table Container */
        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 1.75rem;
            box-shadow: 0 10px 30px 0 rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .table-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .table-title h2 {
            font-size: 1.15rem;
            font-weight: 600;
            border-left: 3px solid var(--gold);
            padding-left: 0.75rem;
        }

        .table-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            padding: 0.55rem 1.15rem;
            border-radius: 10px;
            font-size: 0.875rem;
            outline: none;
            transition: var(--transition);
            min-width: 220px;
        }

        .search-input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 12px var(--gold-glow);
        }

        .select-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            padding: 0.55rem 2.25rem 0.55rem 1.15rem;
            border-radius: 10px;
            font-size: 0.875rem;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='none'%3E%3Cpath stroke='%23a8a29e' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.2em;
        }

        .select-input:focus {
            border-color: var(--gold);
            background-color: #1c1917;
        }

        .select-input option {
            background: #1c1917;
            color: var(--text-primary);
        }

        .export-btn {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.25);
            color: var(--gold-light);
            padding: 0.55rem 1.25rem;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .export-btn:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold);
        }

        /* Foldable Table Styles */
        .table-responsive {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th {
            background: rgba(255, 255, 255, 0.015);
            color: var(--text-secondary);
            font-weight: 600;
            padding: 1.15rem 1.25rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            letter-spacing: 0.5px;
        }

        .main-row {
            cursor: pointer;
            transition: var(--transition);
        }

        .main-row td {
            padding: 1.15rem 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
        }

        .main-row:hover td {
            background: rgba(212, 175, 55, 0.03);
        }

        /* Active expanded row */
        .main-row.expanded td {
            background: rgba(212, 175, 55, 0.05);
            border-bottom-color: transparent;
        }

        /* Expand Chevron */
        .chevron {
            transition: transform 0.3s ease;
            color: var(--text-secondary);
        }

        .expanded .chevron {
            transform: rotate(180deg);
            color: var(--gold);
        }

        /* Collapsed detail sub-row */
        .detail-row {
            display: none;
        }

        .detail-row.show {
            display: table-row;
        }

        .detail-cell {
            padding: 0 1.5rem 1.5rem 1.5rem;
            background: rgba(212, 175, 55, 0.02);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .detail-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s ease, opacity 0.3s ease;
            padding: 0;
            opacity: 0;
        }

        .detail-row.show .detail-container {
            max-height: 500px;
            padding: 1.25rem;
            opacity: 1;
        }

        /* Detail Panel Grid */
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.25rem 2rem;
            background: rgba(28, 25, 23, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            padding: 1.25rem 1.75rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .detail-key {
            font-size: 0.775rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 0.925rem;
            color: var(--text-primary);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.775rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .badge-type-1 {
            background: rgba(212, 175, 55, 0.12);
            color: var(--gold-light);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .badge-type-2 {
            background: rgba(168, 162, 158, 0.15);
            color: #d6d3d1;
            border: 1px solid rgba(168, 162, 158, 0.25);
        }

        .badge-card-status {
            background: rgba(16, 185, 129, 0.1);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.18);
        }

        .badge-id {
            font-family: 'Outfit', sans-serif;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
        }

        /* Empty State */
        .empty-state {
            padding: 3.5rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Chevron SVG Icon */
        .chevron-icon {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Login Overlay styles */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 10, 9, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: var(--transition);
        }

        .login-card {
            background: rgba(28, 25, 23, 0.95);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 2.5rem;
            width: 420px;
            max-width: 95%;
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.15);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .login-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
            letter-spacing: 0.5px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .login-btn {
            background: linear-gradient(135deg, var(--gold) 0%, #b38f4d 100%);
            border: none;
            color: #000;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        .login-btn:hover {
            box-shadow: 0 0 15px var(--gold-glow);
            transform: translateY(-2px);
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }

            grid-template-columns: repeat(2, minmax(0, 1fr));

        .dashboard-nav-button {

            transform: none !important;

        .task-list-content {
            padding-top: 1.25rem;

        .task-list-content[hidden] {
            display: none;
        }

        .target-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            padding-bottom: 0.75rem;
        }

        .target-tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.5rem 1rem;
            position: relative;
            transition: var(--transition);
        }

        .target-tab-btn:hover {
            color: var(--gold-light);
        }

        .target-tab-btn.active {
            color: var(--gold);
        }

        .target-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -0.85rem;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--gold);
            border-radius: 9999px;
            box-shadow: 0 0 8px var(--gold-glow);
        }

        .progress-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.25rem 2rem;
        }

        .progress-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
        }

        .progress-name {
            font-weight: 600;
        }

        .progress-numbers {
            color: var(--text-secondary);
        }

        .progress-bar-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 9999px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #b38f4d 0%, var(--gold) 100%);
            border-radius: 9999px;
            width: 0%;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 8px var(--gold-glow);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 10, 9, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: var(--transition);
        }

        .modal-card {
            background: rgba(28, 25, 23, 0.98);
            border: 1px solid var(--gold);
            border-radius: 20px;
            width: 550px;
            max-width: 95%;
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.15);

            flex-direction: column;
            overflow: hidden;
            animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold);
        }

        .modal-close-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            line-height: 1;
        }

        .modal-close-btn:hover {
            color: var(--gold-light);
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            max-height: 65vh;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .modal-body .form-group.full-width {
            grid-column: span 2;
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        /* Pagination container */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.25rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-size-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .page-size-select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            border-radius: 6px;
            padding: 0.25rem 0.5rem;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .page-size-select:focus {
            border-color: var(--gold);
        }

        .page-nav-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            border-radius: 6px;
            padding: 0.35rem 0.75rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-info-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-family: 'Outfit';
        }

        /* Summary Row styles */
        .table-summary-row {
            background: rgba(212, 175, 55, 0.05);
            border-top: 2px solid rgba(212, 175, 55, 0.3);
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
        }

        .table-summary-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .summary-stats-wrapper {
            display: flex;
            gap: 1.75rem;
            align-items: center;
        }

        .summary-stat-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .summary-separator {
            width: 1px;
            height: 12px;
            background: rgba(255, 255, 255, 0.15);
        }

        /* H5 Mobile Responsive Styling */
        @media (max-width: 600px) {
            body {
                padding: 1rem 0.75rem;
            }

            .container {
                gap: 1.5rem;
            }

            header {
                padding: 1.15rem 1.5rem;
            }

            .header-title h1 {
                font-size: 1.45rem;
            }

            .filters-wrapper {
                padding: 1.15rem 1.5rem;
            }

            .filter-group {
                gap: 0.75rem;
            }

            .filter-label {
                min-width: auto;
                width: 100%;
                margin-bottom: 0.25rem;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }

            .kpi-card {
                padding: 1.15rem 1rem;
                border-radius: 14px;
            }

            .kpi-info h3 {
                font-size: 0.75rem;
                margin-bottom: 0.35rem;
            }

            .kpi-info .kpi-value {
                font-size: 1.45rem;
            }

            .kpi-card.kpi-action-card .kpi-value {
                font-size: 1.25rem;
            }

            #kpi-latest-date {
                font-size: 1.05rem !important;
                white-space: nowrap;
                letter-spacing: -0.5px;
            }

            .kpi-info .kpi-subtext {
                font-size: 0.7rem;
            }

            .kpi-icon-box {
                width: 38px;
                height: 38px;
                border-radius: 10px;
                padding: 0;
            }

            .kpi-icon-box svg {
                width: 18px;
                height: 18px;
            }

            .charts-row {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }

            .chart-card {
                height: 320px;
                padding: 1.25rem 1.15rem;
                border-radius: 16px;
            }

            .table-card {
                padding: 1.25rem 1.15rem;
                border-radius: 16px;
            }

            .table-toolbar {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }

            .table-actions {
                flex-direction: column;
                align-items: stretch;
                gap: 0.75rem;
            }

            .search-input, .select-input, .export-btn, .date-input {
                width: 100%;
                min-width: 0;
            }

            .date-range-wrapper {
                width: 100%;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            /* Responsive folding table cards for mobile */
            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead {
                display: none;
            }

            .main-row {
                padding: 1.15rem 1.25rem;
                margin-bottom: 0.85rem;
                border: 1px solid var(--card-border);
                border-radius: 16px;
                background: rgba(28, 25, 23, 0.55);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
                transition: var(--transition);
            }

            .main-row:active {
                background: rgba(212, 175, 55, 0.05);
                border-color: var(--gold);
            }

            .main-row td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.45rem 0 !important;
                border: none !important;
                background: transparent !important;
                width: 100% !important;
                text-align: left !important;
                font-size: 0.85rem;
            }

            /* Custom styled header for the card (Client Name) */
            .main-row td:first-child {
                font-size: 1.05rem;
                color: var(--gold);
                font-weight: 700;
                border-bottom: 1px solid rgba(212, 175, 55, 0.15) !important;
                padding-bottom: 0.65rem !important;
                margin-bottom: 0.5rem;
                display: flex;
                justify-content: space-between;
                width: 100% !important;
            }

            .main-row td:first-child::before {
                content: "👤 客户姓名";
                color: var(--gold-light);
                font-size: 0.8rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            /* Add labels before cell values on mobile */
            .main-row td:not(:first-child)::before {
                content: attr(data-label) "：";
                color: var(--text-secondary);
                font-size: 0.775rem;
                font-weight: 500;
            }

            /* H5 Targets styles */
            .target-section {
                padding: 1.25rem 1.15rem;
                border-radius: 16px;
            }

            .target-tabs {
                gap: 0.5rem;
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }

            .target-tab-btn {
                font-size: 0.9rem;
                padding: 0.5rem 0.5rem;
                white-space: nowrap;
            }

            .target-tab-btn.active::after {
                bottom: -0.6rem;
            }

            .progress-list {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            /* H5 Pagination and Modal */
            .pagination-container {
                flex-direction: column;
                align-items: center;
                gap: 0.75rem;
                width: 100%;
            }
            .modal-body {
                grid-template-columns: 1fr;
                max-height: 55vh;
            }
            .modal-body .form-group.full-width {
                grid-column: span 1;
            }

            /* H5 Summary Row styles */
            .table-summary-row {
                display: block !important;
                margin-top: 1rem;
                border: 1px solid rgba(212, 175, 55, 0.25) !important;
                border-radius: 12px;
                background: rgba(28, 25, 23, 0.5) !important;
                padding: 0.25rem 0;
            }
            .table-summary-row td {
                display: block !important;
                padding: 0 !important;
                border: none !important;
                width: 100% !important;
            }
            .table-summary-content {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 0.75rem;
                padding: 1rem !important;
            }
            .summary-stats-wrapper {
                flex-direction: column;
                align-items: stretch !important;
                gap: 0.5rem !important;
                width: 100%;
            }
            .summary-stat-item {
                display: flex;
                justify-content: space-between;
                width: 100%;
                font-size: 0.85rem;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding-bottom: 0.35rem;
            }
            .summary-stat-item:last-child {
                border-bottom: none;
                padding-bottom: 0;
            }
            .summary-separator {
                display: none !important;
            }
        }
    </style>
</head>

    function parseExcelDate(dateStr) {
        if (!dateStr) return null;
        const match = dateStr.match(/(\d+)年(\d+)月(\d+)日/);
        if (match) {
            return new Date(parseInt(match[1]), parseInt(match[2]) - 1, parseInt(match[3]));
        }
        const d = new Date(dateStr);
        return isNaN(d.getTime()) ? null : d;
    }

    function formatDateToISO(date) {
        if (!date) return "";
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function calculateDateRange(range) {
        const now = new Date();
        now.setHours(0,0,0,0);
        
        let start = null;
        let end = null;
        
        switch (range) {
            case 'today':
                start = new Date(now);
                end = new Date(now);
                break;
            case 'yesterday':
                start = new Date(now);
                start.setDate(now.getDate() - 1);
                end = new Date(start);
                break;
            case 'this-week': {
                const day = now.getDay();
                const diff = now.getDate() - day + (day === 0 ? -6 : 1);
                start = new Date(now);
                start.setDate(diff);
                end = new Date(start);
                end.setDate(start.getDate() + 6);
                break;
            }
            case 'last-week': {
                const day = now.getDay();
                const diff = now.getDate() - day + (day === 0 ? -6 : 1) - 7;
                start = new Date(now);
                start.setDate(diff);
                end = new Date(start);
                end.setDate(start.getDate() + 6);
                break;
            }
            case 'this-month':
                start = new Date(now.getFullYear(), now.getMonth(), 1);
                end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                break;
            case 'last-month':
                start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                end = new Date(now.getFullYear(), now.getMonth(), 0);
                break;
            case 'this-quarter': {
                const quarter = Math.floor(now.getMonth() / 3);
                start = new Date(now.getFullYear(), quarter * 3, 1);
                end = new Date(now.getFullYear(), quarter * 3 + 3, 0);
                break;
            }
            case 'this-year':
                start = new Date(now.getFullYear(), 0, 1);
                end = new Date(now.getFullYear(), 12, 0);
                break;
            case 'last-year':
                start = new Date(now.getFullYear() - 1, 0, 1);
                end = new Date(now.getFullYear() - 1, 12, 0);
                break;
            case 'all':
            default:
                start = null;
                end = null;
                break;
        }
        
        return { start, end };
    }

        };

        startDateInput.addEventListener('change', onDateChange);
        endDateInput.addEventListener('change', onDateChange);

        // Quick date range buttons
        const rangeButtons = document.querySelectorAll('#quick-date-filters .filter-btn');
        rangeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                rangeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRange = btn.getAttribute('data-range');
                
                const range = calculateDateRange(currentRange);
                startDate = range.start;
                endDate = range.end;

                // Sync with HTML date inputs
                startDateInput.value = startDate ? formatDateToISO(startDate) : "";
                endDateInput.value = endDate ? formatDateToISO(endDate) : "";
                
                updateDashboard();
            });
        });
    }

    function refreshSalesFilterOptions() {
        const salesFilter = document.getElementById('sales-filter');
        if (!salesFilter) return;

        const owners = [...new Set(
            CURRENT_DATABASE
                .map(item => (item.owner || '').trim())
                .filter(Boolean)
        )].sort((a, b) => a.localeCompare(b, 'zh-CN'));

        if (currentOwner !== 'all' && !owners.includes(currentOwner)) {
            currentOwner = 'all';
        }

        salesFilter.replaceChildren();
        const allOption = document.createElement('option');
        allOption.value = 'all';
        allOption.textContent = '全部销售人员';
        salesFilter.appendChild(allOption);
        owners.forEach(owner => {
            const option = document.createElement('option');
            option.value = owner;
            option.textContent = owner;
            salesFilter.appendChild(option);
        });
        salesFilter.value = currentOwner;

    function calculateTargetCompletions() {
        const completions = {};
        
        // Initialize all config keys to 0
        Object.keys(TARGET_CONFIG.sales).forEach(k => completions[k] = 0);
        Object.keys(TARGET_CONFIG.dept).forEach(k => completions[k] = 0);
        
        // Sum from raw dataset
        CURRENT_DATABASE.forEach(d => {
            const owner = d.owner;
            const mappedOwner = OWNER_ALIAS_MAP[owner] || owner;
            
            if (mappedOwner in completions) {
                completions[mappedOwner]++;
            }
        });
        
        return completions;
    }

    function renderTargetProgress() {
        const completions = calculateTargetCompletions();
        const listContainer = document.getElementById('target-progress-list');
        if (!listContainer) return;
        listContainer.innerHTML = '';
        
        const config = TARGET_CONFIG[activeTargetTab];
        
        Object.entries(config).forEach(([name, info]) => {
            const targetVal = info.target;
            const completedVal = completions[name] || 0;
            const percentage = Math.min(100, Math.round((completedVal / targetVal) * 100));
            
            const itemHTML = `
                <div class="progress-item">
                    <div class="progress-header">
                        <span class="progress-name">${info.label}</span>
                        <span class="progress-numbers">${completedVal} / ${targetVal} 单</span>
                    </div>
                    <div class="progress-bar-track">
                        <div class="progress-bar-fill" style="width: 0%;"></div>
                    </div>
                    <div style="display: flex; justify-content: flex-end; font-size: 0.75rem; color: var(--gold-light); margin-top: -0.15rem;">
                        ${percentage}%
                    </div>
                </div>
            `;
            
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = itemHTML.trim();
            const itemElement = tempDiv.firstChild;
            listContainer.appendChild(itemElement);
            
            // Animate width after appending
            setTimeout(() => {
                const fill = itemElement.querySelector('.progress-bar-fill');
                if (fill) fill.style.width = `${percentage}%`;
            }, 100);
        });
    }

    function toggleTaskList() {
        const button = document.getElementById('task-list-toggle');
        const content = document.getElementById('task-list-content');
        const willOpen = content.hidden;
        content.hidden = !willOpen;
        button.setAttribute('aria-expanded', String(willOpen));
        localStorage.setItem('banquet_task_list_open', String(willOpen));

        const buttons = document.querySelectorAll('.target-tab-btn');
        buttons.forEach(btn => {

    // Filter master data by type and date range
    function filterData() {
        filteredData = CURRENT_DATABASE.filter(item => {
            const matchType = (currentType === 'all' || item.card_type === currentType);
            const matchOwner = (currentOwner === 'all' || item.owner === currentOwner);
            
            let matchDate = true;
            if (startDate || endDate) {
                const itemDate = parseExcelDate(item.reg_time);
                if (itemDate) {
                    itemDate.setHours(0, 0, 0, 0);
                    
                    if (startDate) {
                        const start = new Date(startDate);
                        start.setHours(0, 0, 0, 0);
                        if (itemDate < start) matchDate = false;
                    }
                    if (endDate) {
                        const end = new Date(endDate);
                        end.setHours(0, 0, 0, 0);
                        if (itemDate > end) matchDate = false;
                    }
                } else {
                    matchDate = false;
                }
            }
            
            return matchType && matchOwner && matchDate;
        });
    }

    // Compute metrics and update cards
    function renderKPIs() {
        const total = filteredData.length;
        
        // Types counts
        const type1Count = filteredData.filter(d => d.card_type === '生日卡').length;
        const type2Count = filteredData.filter(d => d.card_type === '订婚卡').length;

        // Card status (paid)
        const paidCount = filteredData.filter(d => d.card_status.includes('已购买') || d.card_status.includes('已收款') || d.card_status.includes('已付')).length;
        const paidPct = total > 0 ? Math.round((paidCount / total) * 100) : 0;

        // Sales Leader (Champion)
        const salesStats = {};
        filteredData.forEach(d => {
            if (d.owner) salesStats[d.owner] = (salesStats[d.owner] || 0) + 1;
        });
        
        let champ = '-';
        let champCount = 0;
        for (const [name, count] of Object.entries(salesStats)) {
            if (count > champCount) {
                champCount = count;
                champ = name;
            }
        }

        // Latest registration date and its count
        const dateCounts = {};
        filteredData.forEach(d => {
            if (d.reg_time) dateCounts[d.reg_time] = (dateCounts[d.reg_time] || 0) + 1;
        });
        
        // Find latest date in sorted format
        const sortedDates = Object.keys(dateCounts).sort();
        const latestDate = sortedDates.length > 0 ? sortedDates[sortedDates.length - 1] : '-';
        const latestCount = latestDate !== '-' ? dateCounts[latestDate] : 0;

        // Update elements
        document.getElementById('kpi-total').textContent = total.toString();
        document.getElementById('kpi-total-sub').textContent = `生日卡: ${type1Count} | 订婚卡: ${type2Count}`;
    }

    // Render sales ranking graphs
    function renderCharts() {
        if (typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        }

        const salesStats = {};
        filteredData.forEach(d => {
            if (d.owner) salesStats[d.owner] = (salesStats[d.owner] || 0) + 1;
        });

        const sortedSales = Object.entries(salesStats).sort((a, b) => b[1] - a[1]);
        const labels = sortedSales.map(item => item[0]);
        const counts = sortedSales.map(item => item[1]);

        if (salesPieInstance) salesPieInstance.destroy();
        if (salesBarInstance) salesBarInstance.destroy();

        if (labels.length === 0) return;

        // Colors matching Image 2's palette
        const pieColors = [
            '#e2a566', // Orange/gold
            '#c864d8', // Purple
            '#a4b2b6', // Slate blue/gray
            '#d4af37', // Gold
            '#736036', // Muted gold
            '#8fbc8f', // Dark sea green
            '#db7093'  // Pale violet red
        ];

        // Custom plugin for drawing callout connector lines for the pie chart
        const pieConnectorsPlugin = {
            id: 'pieConnectors',
            afterDraw(chart) {
                const ctx = chart.ctx;
                ctx.save();
                const dataset = chart.data.datasets[0];
                const meta = chart.getDatasetMeta(0);
                
                if (!meta.data || meta.data.length === 0) return;
                
                meta.data.forEach((arc, i) => {
                    const val = dataset.data[i];
                    if (!val || val === 0) return;
                    
                    const centerAngle = arc.startAngle + (arc.endAngle - arc.startAngle) / 2;
                    const cx = arc.x !== undefined ? arc.x : chart.width / 2;
                    const cy = arc.y !== undefined ? arc.y : chart.height / 2;
                    const outerRadius = arc.outerRadius !== undefined ? arc.outerRadius : Math.min(chart.width, chart.height) / 4;
                    
                    // Line start point on outer edge of the slice
                    const startX = cx + Math.cos(centerAngle) * outerRadius;
                    const startY = cy + Math.sin(centerAngle) * outerRadius;
                    
                    // Intermediate line point
                    const midX = cx + Math.cos(centerAngle) * (outerRadius + 14);
                    const midY = cy + Math.sin(centerAngle) * (outerRadius + 14);
                    
                    // End line point (horizontal segment)
                    const isLeft = Math.cos(centerAngle) < 0;
                    const endX = midX + (isLeft ? -10 : 10);
                    const endY = midY;
                    
                    // Draw path
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(midX, midY);
                    ctx.lineTo(endX, endY);
                    ctx.strokeStyle = arc.options.backgroundColor || '#fafaf9';
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                });
                ctx.restore();
            }
        };

        // Pie chart (solid pie with callouts matching Image 2)
        const ctxPie = document.getElementById('salesPieChart').getContext('2d');
        salesPieInstance = new Chart(ctxPie, {
            type: 'pie',
            plugins: [pieConnectorsPlugin],
            data: {
                labels: labels,
                datasets: [{
                    data: counts,
                    backgroundColor: pieColors.slice(0, labels.length),
                    borderColor: 'rgba(12, 10, 9, 0.4)',
                    borderWidth: 1.5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        left: 45,
                        right: 45,
                        top: 25,
                        bottom: 25
                    }
                },
                plugins: {
                    legend: { display: false }, // Callouts show label names, hide legend box
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const val = context.raw;
                                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                const percentage = total > 0 ? Math.round((val / total) * 100) : 0;
                                return ` ${context.label}: ${val} 单 (${percentage}%)`;
                            }
                        }
                    },
                    datalabels: {
                        color: (context) => {
                            // Match label color to slice color
                            return context.dataset.backgroundColor[context.dataIndex];
                        },
                        font: {
                            family: 'Outfit, Noto Sans SC',
                            weight: '500',
                            size: 11
                        },
                        formatter: (value, ctx) => {
                            const label = ctx.chart.data.labels[ctx.dataIndex];
                            const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                            const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                            return `${label}, ${value}, ${percentage}%`;
                        },
                        anchor: 'end',
                        align: (context) => {
                            const arc = context.chart.getDatasetMeta(0).data[context.dataIndex];
                            const centerAngle = arc.startAngle + (arc.endAngle - arc.startAngle) / 2;
                            return Math.cos(centerAngle) < 0 ? 'left' : 'right';
                        },
                        offset: 18
                    }
                }
            }
        });

        // Bar chart (horizontal bars with horizontal gradients matching Image 1)
        const ctxBar = document.getElementById('salesBarChart').getContext('2d');
        
        // Create horizontal linear gradient
        const gradient = ctxBar.createLinearGradient(0, 0, 320, 0);
        gradient.addColorStop(0, 'rgba(180, 140, 80, 0.6)'); // darker bronze
        gradient.addColorStop(1, 'rgba(212, 175, 55, 0.95)'); // bright gold

        salesBarInstance = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '销售总量',
                    data: counts,
                    backgroundColor: gradient,
                    borderColor: 'rgba(212, 175, 55, 1)',
                    borderWidth: 1.2,
                    borderRadius: 6
                }]
            },
            options: {
                indexAxis: 'y', // horizontal bar chart
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        right: 35 // prevent datalabels from clipping
                    }
                },
                plugins: {
                    legend: {
                        display: true,
                        position: 'top',
                        align: 'center',
                        labels: {
                            color: '#fafaf9',
                            boxWidth: 12,
                            boxHeight: 12,
                            font: { family: 'Outfit, Noto Sans SC', size: 12 }
                        }
                    },
                    datalabels: {
                        color: '#fafaf9',
                        anchor: 'end',
                        align: 'right',
                        offset: 8,
                        font: {
                            family: 'Outfit, Noto Sans SC',
                            weight: '500',
                            size: 13
                        },
                        formatter: (value) => {
                            return value;
                        }
                    }
                },
                scales: {
                    x: {
                        grace: '10%',
                        grid: { color: 'rgba(255, 255, 255, 0.05)' }, // vertical grids
                        ticks: { 
                            color: '#fafaf9', 
                            stepSize: 1,
                            font: { family: 'Outfit, Noto Sans SC' } 
                        }
                    },
                    y: {
                        grid: { display: false }, // no horizontal grids
                        ticks: { 
                            color: '#fafaf9', 
                            font: { family: 'Outfit, Noto Sans SC', size: 12 } 
                        }
                    }
                }
            }
        });
    }

    // Helper to render table alone for search input updates
    function renderTableOnly() {
        const tbody = document.getElementById('table-body');
        const emptyState = document.getElementById('table-empty');

        // Apply local search filtering
        let tableData = filteredData.filter(item => {
            return searchQuery === '' || 
                   item.name.toLowerCase().includes(searchQuery) ||
                   item.owner.toLowerCase().includes(searchQuery);
        });

        // Apply identity login filter: show only logged-in user's records
        if (!isAllDataViewer()) {
            tableData = tableData.filter(item => {
                const mappedOwner = OWNER_ALIAS_MAP[item.owner] || item.owner;
                return mappedOwner === loggedInUser;
            });
        }

        // Calculate summary metrics for currently visible items BEFORE pagination slicing
        const totalCount = tableData.length;
        const birthdayCount = tableData.filter(item => item.card_type === '生日卡').length;
        const engagementCount = tableData.filter(item => item.card_type === '订婚卡').length;

        // Apply pagination slicing
        const totalPages = Math.max(1, Math.ceil(tableData.length / pageSize));
        if (currentPage > totalPages) currentPage = totalPages;
        
        const startIndex = (currentPage - 1) * pageSize;
        const endIndex = startIndex + pageSize;
        const paginatedData = tableData.slice(startIndex, endIndex);

        // Update pagination controls UI
        const pageInfo = document.getElementById('page-info');
        if (pageInfo) pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页`;
        
        const prevBtn = document.getElementById('prev-page-btn');
        if (prevBtn) prevBtn.disabled = (currentPage === 1);
        
        const nextBtn = document.getElementById('next-page-btn');
        if (nextBtn) nextBtn.disabled = (currentPage === totalPages);

        if (tableData.length === 0) {
            tbody.innerHTML = '';
            emptyState.style.display = 'block';
            return;
        } else {
            emptyState.style.display = 'none';
        }

        const rowsHTML = paginatedData.map((item, index) => {
            const badgeClass = item.card_type === '生日卡' ? 'badge-type-1' : 'badge-type-2';
            
            const rowAction = loggedInUser === VIEW_ONLY_USER
                ? 'style="cursor: default;"'
                : `onclick="openEditModal('${item.id}', event)" style="cursor: pointer;"`;

            return `
                <tr class="main-row" ${rowAction}>
                    <td data-label="客户姓名" style="font-weight: 500;">${item.name}</td>
                    <td data-label="负责人" style="color: var(--gold-light);">${item.owner}</td>
                    <td data-label="宴会来源">${item.channel}</td>
                    <td data-label="卡片类型"><span class="badge ${badgeClass}">${item.card_type}</span></td>
                    <td data-label="宴会日期">${item.banquet_date || '未定'}</td>
                    <td data-label="登记时间">${item.reg_time}</td>
                    <td data-label="卡片状态"><span class="badge badge-card-status">${item.card_status}</span></td>
                </tr>
            `;
        }).join('');

        const summaryRowHTML = `
            <tr class="table-summary-row">
                <td colspan="7">
                    <div class="table-summary-content">
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <span style="font-size: 1.1rem;">📊</span>
                            <span style="color: var(--gold-light);">数据汇总 (当前显示)</span>
                        </div>
                        <div class="summary-stats-wrapper">
                            <div class="summary-stat-item">总成交数据: <span style="color: var(--gold); font-size: 1.1rem; font-family: 'Outfit'; font-weight: 600;">${totalCount} 单</span></div>
                            <div class="summary-separator"></div>
                            <div class="summary-stat-item">生日卡: <span style="color: #d4af37; font-family: 'Outfit'; font-weight: 600;">${birthdayCount} 张</span></div>
                            <div class="summary-separator"></div>
                            <div class="summary-stat-item">订婚卡: <span style="color: #e5c158; font-family: 'Outfit'; font-weight: 600;">${engagementCount} 张</span></div>
                        </div>
                    </div>
                </td>
            </tr>
        `;

        tbody.innerHTML = rowsHTML + summaryRowHTML;
    }

    async function saveRecord() {
        const name = document.getElementById('modal-name').value.trim();
        const phone = document.getElementById('modal-phone').value.trim();
        const owner = document.getElementById('modal-owner').value;
        const channel = document.getElementById('modal-channel').value.trim();
        const card_type = document.getElementById('modal-card-type').value;
        const banquet_date = document.getElementById('modal-banquet-date').value;
        const package_val = document.getElementById('modal-package').value.trim();
        const card_status = document.getElementById('modal-card-status').value;
        const remarks = document.getElementById('modal-remarks').value.trim();
        const physical_card_no = document.getElementById('modal-id').value.trim();
        
        if (!name) {
            alert("请输入客户姓名！");
            return;
        }
        let finalBanquetDate = banquet_date || "未定";
        const updatedFields = {
            name: name,
            phone: phone || "未填",
            owner: owner,
            channel: channel || "手动录入",
            card_type: card_type,
            banquet_date: finalBanquetDate,
            package: package_val || "未约定",
            card_status: card_status,
            remarks: remarks || "无",
            physical_card_no: physical_card_no
        };
        
        try {
            let res;
            if (editingId === null) {
                // Add record via API
                res = await fetch('/api/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedFields)
                });
            } else {
                // Edit record via API
                res = await fetch(`/api/data/${editingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedFields)
                });
            }
            
            const result = await res.json();
            if (result.success) {
                alert(editingId === null ? "客资添加成功！" : "客资修改成功！");
                closeModal();
                // Reload from backend and refresh dashboard view
                await loadDataFromServer();
                updateDashboard();
            } else {
                alert("保存失败：" + result.error);
            }
        } catch (e) {
            console.error("Error saving record to server", e);
            alert("网络错误，保存失败！");
        }
    }

    async function deleteRecord() {
        if (loggedInUser !== "系统管理员" || !editingId) {
            alert("仅系统管理员可以删除客资！");
            return;
        }

        const record = CURRENT_DATABASE.find(item => item.id === editingId);
        if (!record) {
            alert("未找到需要删除的客资！");
            return;
        }

        if (!confirm(`确定删除客户“${record.name || '未命名'}”的客资吗？删除后无法恢复。`)) {
            return;
        }

        const button = document.getElementById('delete-record-btn');
        button.disabled = true;
        button.textContent = "删除中...";
        try {
            const res = await fetch(`/api/data/${encodeURIComponent(editingId)}`, {
                method: 'DELETE',
                headers: { 'X-Admin-Password': ADMIN_PASSWORD }
            });
            const result = await res.json();
            if (!res.ok || !result.success) {
                throw new Error(result.error || "删除失败");
            }
            closeModal();
            await loadDataFromServer();
            updateDashboard();
            alert("客资已删除！");
        } catch (e) {
            console.error("Error deleting record", e);
            alert("删除失败：" + e.message);
        } finally {
            button.disabled = false;
            button.textContent = "删除客资";
        }
    }



    // Export dataset to CSV
    function exportToCSV() {
        if (loggedInUser !== "系统管理员") {
            alert("仅系统管理员可以导出客资数据！");
            return;
        }

        const tableData = filteredData.filter(item => {
            return searchQuery === '' || 
                   item.name.toLowerCase().includes(searchQuery) ||
                   item.owner.toLowerCase().includes(searchQuery);
        });

        if (tableData.length === 0) {
            alert('当前没有可导出的数据');
            return;
        }

        let csvContent = "\uFEFF"; // UTF-8 BOM
        csvContent += "系统编号,实体卡号,获客渠道,负责人,客户姓名,联系电话,原宴会类型,卡片分类,宴会日期,餐标套餐,卡片购买状态,登记时间,备注\n";

        tableData.forEach(item => {
            const row = [
                item.id,
                item.physical_card_no || '',
                item.channel,
                item.owner,
                item.name,
                item.phone,
                item.raw_type,
                item.card_type,
                item.banquet_date,
                item.package,
                item.card_status,
                item.reg_time,
                item.remarks
            ].map(val => `"${String(val ?? '').replace(/"/g, '""')}"`).join(",");
            csvContent += row + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        const t = currentType === 'all' ? '全部卡型' : currentType;
        const d = currentDate === 'all' ? '全部日期' : currentDate;

        link.setAttribute("href", url);
        link.setAttribute("download", `盛世礼宴小宴会客资报表_${t}_${d}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
