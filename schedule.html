<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        (() => {
            let activeTheme = null;
            const applyTimeTheme = () => {
                const hour = new Date().getHours();
                const nextTheme = hour >= 6 && hour < 18 ? 'day' : 'night';
                if (activeTheme && activeTheme !== nextTheme) window.location.reload();
                activeTheme = nextTheme;
                document.documentElement.dataset.theme = nextTheme;
            };
            applyTimeTheme();
            window.setInterval(applyTimeTheme, 60000);
        })();
    </script>
    <title>档期表 · 盛世礼宴小宴会</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0a09;
            --panel: rgba(28, 25, 23, 0.9);
            --border: rgba(212, 175, 55, 0.22);
            --gold: #d4af37;
            --gold-light: #f3d27c;
            --text: #fafaf9;
            --muted: #a8a29e;
        }

        html[data-theme="day"] {
            --bg: #f4f1ea;
            --panel: rgba(255, 255, 255, 0.94);
            --border: rgba(154, 111, 0, 0.24);
            --gold: #b88713;
            --gold-light: #8a6508;
            --text: #1c1917;
            --muted: #57534e;
        }

        * { box-sizing: border-box; }

        html, body {
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 8% 5%, rgba(212, 175, 55, 0.12), transparent 28rem),
                radial-gradient(circle at 92% 95%, rgba(120, 85, 30, 0.1), transparent 30rem),
                var(--bg);
            font-family: "Outfit", "Noto Sans SC", sans-serif;
        }

        button, input { font: inherit; }

        .page {
            width: min(1200px, calc(100% - 40px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .top-actions {
            margin-bottom: 18px;
        }

        .back-button {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 10px 18px;
            color: #17130b;
            text-decoration: none;
            border: 1px solid #f0ce75;
            border-radius: 12px;
            background: linear-gradient(135deg, #f3d27c, #cfa93c);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.2);
            font-weight: 700;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
        }

        .subtitle {
            margin: 7px 0 0;
            color: var(--muted);
        }

        .status {
            padding: 9px 14px;
            color: var(--gold-light);
            white-space: nowrap;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(212, 175, 55, 0.06);
            font-size: 0.84rem;
        }

        .calendar-panel {
            margin-bottom: 20px;
            padding: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--panel);
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.3);
        }

        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 17px;
        }

        .calendar-title {
            min-width: 150px;
            color: var(--text);
            text-align: center;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .calendar-nav {
            width: 40px;
            height: 40px;
            display: grid;
            place-items: center;
            color: var(--gold-light);
            border: 1px solid var(--border);
            border-radius: 11px;
            background: rgba(212, 175, 55, 0.06);
            cursor: pointer;
        }

        .calendar-nav:hover {
            border-color: rgba(212, 175, 55, 0.55);
            background: rgba(212, 175, 55, 0.12);
        }

        .today-button {
            min-height: 38px;
            padding: 7px 13px;
            color: var(--gold-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(212, 175, 55, 0.06);
            cursor: pointer;
        }

        .calendar-weekdays, .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
        }

        .calendar-weekdays {
            margin-bottom: 7px;
            color: var(--muted);
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .calendar-weekdays div {
            padding: 7px 0;
        }

        .calendar-grid {
            gap: 6px;
        }

        .calendar-day {
            position: relative;
            min-width: 0;
            min-height: 94px;
            padding: 9px 8px;
            overflow: hidden;
            color: var(--text);
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.055);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.022);
            cursor: pointer;
        }

        .calendar-day:hover {
            border-color: rgba(212, 175, 55, 0.34);
            background: rgba(212, 175, 55, 0.055);
        }

        .calendar-day.outside {
            color: #57534e;
            background: rgba(255, 255, 255, 0.012);
        }

        .calendar-day.today {
            border-color: var(--gold);
            box-shadow: inset 0 0 0 1px rgba(212, 175, 55, 0.3);
        }

        .calendar-day.selected {
            background: rgba(212, 175, 55, 0.12);
            border-color: var(--gold-light);
        }

        .calendar-day-number {
            display: inline-grid;
            place-items: center;
            width: 28px;
            height: 28px;
            font-size: 0.98rem;
            font-weight: 700;
        }

        .calendar-day.today .calendar-day-number {
            color: #17130b;
            border-radius: 50%;
            background: var(--gold-light);
        }

        .calendar-count {
            position: absolute;
            top: 6px;
            right: 6px;
            min-width: 23px;
            height: 23px;
            display: grid;
            place-items: center;
            padding: 0 5px;
            color: white;
            border-radius: 999px;
            background: #f97316;
            box-shadow: 0 5px 12px rgba(249, 115, 22, 0.25);
            font-size: 0.72rem;
            font-weight: 700;
        }

        .calendar-events {
            display: grid;
            gap: 3px;
            margin-top: 4px;
        }

        .calendar-event {
            overflow: hidden;
            padding: 3px 5px;
            color: #f7dfa3;
            white-space: nowrap;
            text-overflow: ellipsis;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 5px;
            background: rgba(212, 175, 55, 0.08);
            font-size: 0.67rem;
        }

        .calendar-selection {
            margin-top: 12px;
            color: var(--muted);
            text-align: center;
            font-size: 0.8rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .summary-card, .schedule-panel {
            border: 1px solid var(--border);
            background: var(--panel);
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.3);
        }

        .summary-card {
            padding: 18px 20px;
            border-radius: 16px;
        }

        .summary-label {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .summary-value {
            margin-top: 5px;
            color: var(--gold-light);
            font-size: 1.8rem;
            font-weight: 700;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 16px;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-button {
            min-height: 40px;
            padding: 8px 14px;
            color: var(--muted);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.035);
            cursor: pointer;
        }

        .filter-button.active {
            color: #16120a;
            border-color: var(--gold);
            background: var(--gold-light);
            font-weight: 700;
        }

        .schedule-layout {
            display: grid;
            grid-template-columns: minmax(0, 1.55fr) minmax(280px, 0.75fr);
            gap: 18px;
            align-items: start;
        }

        .schedule-panel {
            padding: 20px;
            border-radius: 19px;
        }

        .panel-title {
            margin: 0 0 16px;
            font-size: 1.12rem;
        }

        .date-group + .date-group {
            margin-top: 16px;
        }

        .date-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: 9px;
            color: var(--gold-light);
            border-bottom: 1px solid rgba(212, 175, 55, 0.18);
            font-weight: 700;
        }

        .date-count {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 500;
        }

        .record-list {
            display: grid;
            gap: 8px;
            margin-top: 9px;
        }

        .record {
            display: grid;
            grid-template-columns: minmax(100px, 1fr) repeat(3, minmax(75px, auto));
            gap: 12px;
            align-items: center;
            padding: 11px 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 11px;
            background: rgba(255, 255, 255, 0.025);
        }

        .record-name {
            font-weight: 650;
        }

        .record-meta {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .pending-list .record {
            grid-template-columns: minmax(100px, 1fr) minmax(70px, auto);
        }

        .empty {
            padding: 36px 12px;
            color: var(--muted);
            text-align: center;
        }

        .error {
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.32);
        }

        html[data-theme="day"] .calendar-day:not(.selected):not(.today),
        html[data-theme="day"] .record,
        html[data-theme="day"] .filter-button:not(.active) {
            border-color: #e7e5e4;
            background: rgba(250, 250, 249, 0.92);
        }

        html[data-theme="day"] .calendar-day.outside {
            color: #a8a29e;
            background: #f5f5f4;
        }

        @media (max-width: 820px) {
            .page { width: min(100% - 24px, 680px); padding-top: 20px; }
            .page-header { align-items: flex-start; flex-direction: column; gap: 12px; }
            .summary-grid { gap: 8px; }
            .summary-card { padding: 14px 12px; }
            .summary-value { font-size: 1.5rem; }
            .schedule-layout { grid-template-columns: 1fr; }
            .calendar-panel { padding: 14px 10px; }
            .calendar-grid { gap: 3px; }
            .calendar-day { min-height: 78px; padding: 6px 4px; border-radius: 9px; }
            .calendar-day-number { width: 24px; height: 24px; font-size: 0.88rem; }
            .calendar-count { top: 4px; right: 3px; min-width: 20px; height: 20px; font-size: 0.65rem; }
            .calendar-event { padding: 2px 3px; font-size: 0.6rem; }
        }

        @media (max-width: 520px) {
            .record {
                grid-template-columns: 1fr 1fr;
                gap: 6px 10px;
            }
            .record-name { grid-column: 1 / -1; }
            .toolbar { align-items: flex-start; flex-direction: column; }
            .summary-label { font-size: 0.72rem; }
            .calendar-header { gap: 8px; }
            .calendar-title { min-width: 118px; font-size: 1.06rem; }
            .calendar-nav { width: 36px; height: 36px; }
            .today-button { padding: 6px 9px; font-size: 0.78rem; }
            .calendar-day { min-height: 70px; }
        }
    </style>
</head>
<body>
<main class="page">
    <div class="top-actions">
        <a class="back-button" href="index.html" onclick="prepareAllDataReturn()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <span>返回所有数据</span>
        </a>
    </div>

    <header class="page-header">
        <div>
            <h1>档期表</h1>
            <p class="subtitle">按宴会日期查看已安排与待定客资</p>
        </div>
        <div class="status" id="data-status">正在读取实时数据…</div>
    </header>

    <section class="calendar-panel" aria-label="档期日历看板">
        <div class="calendar-header">
            <button class="calendar-nav" type="button" aria-label="上一个月" onclick="changeCalendarMonth(-1)">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="calendar-title" id="calendar-title">-</div>
            <button class="calendar-nav" type="button" aria-label="下一个月" onclick="changeCalendarMonth(1)">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <button class="today-button" type="button" onclick="goToCurrentMonth()">回到今天</button>
        </div>
        <div class="calendar-weekdays" aria-hidden="true">
            <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <div class="calendar-selection" id="calendar-selection">点击日期可查看当天档期数量</div>
    </section>

    <section class="summary-grid" aria-label="档期汇总">
        <div class="summary-card">
            <div class="summary-label">已安排客资</div>
            <div class="summary-value" id="scheduled-count">-</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">待定档期</div>
            <div class="summary-value" id="pending-count">-</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">占用日期</div>
            <div class="summary-value" id="date-count">-</div>
        </div>
    </section>

    <div class="toolbar">
        <div class="filter-buttons" id="schedule-filters">
            <button class="filter-button active" type="button" data-filter="all">全部档期</button>
            <button class="filter-button" type="button" data-filter="future">未来档期</button>
            <button class="filter-button" type="button" data-filter="past">历史档期</button>
        </div>
    </div>

    <section class="schedule-layout">
        <div class="schedule-panel">
            <h2 class="panel-title">已安排档期</h2>
            <div id="scheduled-list"><div class="empty">正在加载…</div></div>
        </div>
        <div class="schedule-panel">
            <h2 class="panel-title">待定档期</h2>
            <div class="pending-list" id="pending-list"><div class="empty">正在加载…</div></div>
        </div>
    </section>
</main>

<script>
    const RETURN_SESSION_KEY = 'banquet_logged_in_user';
    let scheduleRecords = [];
    let activeFilter = 'all';
    const currentDate = new Date();
    currentDate.setHours(0, 0, 0, 0);
    let calendarMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
    let selectedCalendarDate = dateKey(currentDate);

    function prepareAllDataReturn() {
        if (!sessionStorage.getItem(RETURN_SESSION_KEY)) {
            sessionStorage.setItem(RETURN_SESSION_KEY, '全部数据（只读）');
        }
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function parseScheduleDate(value) {
        const text = String(value || '').trim();
        if (!text || text === '未定' || text === '待定') return null;
        const chinese = text.match(/^(\d{4})年(\d{1,2})月(\d{1,2})日$/);
        const normal = text.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
        const match = chinese || normal;
        if (!match) return null;
        const date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
        return Number.isNaN(date.getTime()) ? null : date;
    }

    function dateKey(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function displayDate(date) {
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 · ${weekdays[date.getDay()]}`;
    }

    function changeCalendarMonth(offset) {
        calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + offset, 1);
        renderCalendar();
    }

    function goToCurrentMonth() {
        calendarMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
        selectedCalendarDate = dateKey(currentDate);
        renderCalendar();
    }

    function selectCalendarDate(key) {
        selectedCalendarDate = key;
        renderCalendar();
    }

    function renderCalendar() {
        const title = document.getElementById('calendar-title');
        const grid = document.getElementById('calendar-grid');
        const selection = document.getElementById('calendar-selection');
        if (!title || !grid || !selection) return;

        const eventsByDate = new Map();
        scheduleRecords.forEach(record => {
            const date = parseScheduleDate(record.banquet_date);
            if (!date) return;
            const key = dateKey(date);
            if (!eventsByDate.has(key)) eventsByDate.set(key, []);
            eventsByDate.get(key).push(record);
        });

        title.textContent = `${calendarMonth.getFullYear()}年${String(calendarMonth.getMonth() + 1).padStart(2, '0')}月`;
        const firstDay = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth(), 1);
        const gridStart = new Date(firstDay);
        gridStart.setDate(1 - firstDay.getDay());
        const cells = [];

        for (let index = 0; index < 42; index++) {
            const date = new Date(gridStart);
            date.setDate(gridStart.getDate() + index);
            const key = dateKey(date);
            const events = eventsByDate.get(key) || [];
            const outside = date.getMonth() !== calendarMonth.getMonth();
            const isToday = key === dateKey(currentDate);
            const isSelected = key === selectedCalendarDate;
            const eventLabels = events.slice(0, 2).map(record =>
                `<div class="calendar-event">${escapeHtml(record.owner || record.name || '已排档')}</div>`
            ).join('');
            const moreLabel = events.length > 2
                ? `<div class="calendar-event">另有 ${events.length - 2} 条</div>`
                : '';

            cells.push(`<button class="calendar-day${outside ? ' outside' : ''}${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}"
                type="button" aria-label="${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日，${events.length}条档期"
                onclick="selectCalendarDate('${key}')">
                <span class="calendar-day-number">${date.getDate()}</span>
                ${events.length ? `<span class="calendar-count">${events.length}</span>` : ''}
                <div class="calendar-events">${eventLabels}${moreLabel}</div>
            </button>`);
        }

        grid.innerHTML = cells.join('');
        const selectedDate = parseScheduleDate(selectedCalendarDate);
        const selectedEvents = eventsByDate.get(selectedCalendarDate) || [];
        selection.textContent = selectedDate
            ? `${displayDate(selectedDate)} · ${selectedEvents.length} 条已安排档期`
            : '点击日期可查看当天档期数量';
    }

    function recordHtml(record, pending = false) {
        if (pending) {
            return `<div class="record">
                <div class="record-name">${escapeHtml(record.name || '未命名客户')}</div>
                <div class="record-meta">${escapeHtml(record.owner || '未分配')}</div>
            </div>`;
        }
        return `<div class="record">
            <div class="record-name">${escapeHtml(record.name || '未命名客户')}</div>
            <div class="record-meta">${escapeHtml(record.owner || '未分配')}</div>
            <div class="record-meta">${escapeHtml(record.card_type || '未分类')}</div>
            <div class="record-meta">${escapeHtml(record.package || '未约定')}</div>
        </div>`;
    }

    function renderSchedule() {
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const scheduled = scheduleRecords
            .map(record => ({ record, date: parseScheduleDate(record.banquet_date) }))
            .filter(item => item.date)
            .sort((a, b) => a.date - b.date);
        const pending = scheduleRecords.filter(record => !parseScheduleDate(record.banquet_date));
        const uniqueDates = new Set(scheduled.map(item => dateKey(item.date)));

        document.getElementById('scheduled-count').textContent = scheduled.length;
        document.getElementById('pending-count').textContent = pending.length;
        document.getElementById('date-count').textContent = uniqueDates.size;

        const visible = scheduled.filter(item => {
            if (activeFilter === 'future') return item.date >= today;
            if (activeFilter === 'past') return item.date < today;
            return true;
        });

        const groups = new Map();
        visible.forEach(item => {
            const key = dateKey(item.date);
            if (!groups.has(key)) groups.set(key, { date: item.date, records: [] });
            groups.get(key).records.push(item.record);
        });

        document.getElementById('scheduled-list').innerHTML = groups.size
            ? [...groups.values()].map(group => `<section class="date-group">
                <div class="date-heading">
                    <span>${displayDate(group.date)}</span>
                    <span class="date-count">${group.records.length} 条客资</span>
                </div>
                <div class="record-list">${group.records.map(record => recordHtml(record)).join('')}</div>
            </section>`).join('')
            : '<div class="empty">当前范围内暂无已安排档期</div>';

        document.getElementById('pending-list').innerHTML = pending.length
            ? `<div class="record-list">${pending.map(record => recordHtml(record, true)).join('')}</div>`
            : '<div class="empty">暂无待定档期</div>';

        renderCalendar();
    }

    document.getElementById('schedule-filters').addEventListener('click', event => {
        const button = event.target.closest('[data-filter]');
        if (!button) return;
        activeFilter = button.dataset.filter;
        document.querySelectorAll('[data-filter]').forEach(item => item.classList.toggle('active', item === button));
        renderSchedule();
    });

    async function loadSchedule() {
        const status = document.getElementById('data-status');
        try {
            const response = await fetch('/api/data', { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            if (!result.success || !Array.isArray(result.records)) throw new Error('数据格式不正确');
            scheduleRecords = result.records;
            renderSchedule();
            status.textContent = `实时数据 · ${scheduleRecords.length} 条记录`;
        } catch (error) {
            console.error('档期数据读取失败：', error);
            status.textContent = '数据读取失败，请稍后刷新';
            status.classList.add('error');
            document.getElementById('scheduled-list').innerHTML = '<div class="empty">暂时无法读取档期数据</div>';
            document.getElementById('pending-list').innerHTML = '<div class="empty">暂时无法读取档期数据</div>';
        }
    }

    renderCalendar();
    loadSchedule();
</script>
</body>
</html>
