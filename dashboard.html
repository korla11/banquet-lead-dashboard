<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>仪表盘 · 盛世礼宴小宴会</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root {
            --bg: #0c0a09;
            --panel: rgba(28, 25, 23, 0.92);
            --panel-border: rgba(212, 175, 55, 0.24);
            --gold: #d4af37;
            --gold-light: #f6d98b;
            --text: #fafaf9;
            --muted: #a8a29e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 5%, rgba(212, 175, 55, 0.12), transparent 28rem),
                radial-gradient(circle at 88% 95%, rgba(120, 85, 30, 0.1), transparent 30rem),
                var(--bg);
            font-family: "Outfit", "Noto Sans SC", sans-serif;
        }

        .dashboard-page {
            width: min(1440px, calc(100% - 40px));
            margin: 0 auto;
            padding: 36px 0 48px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 28px;
        }

        .title-wrap {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .back-button {
            width: 44px;
            height: 44px;
            flex: 0 0 auto;
            display: grid;
            place-items: center;
            color: var(--gold-light);
            text-decoration: none;
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            background: rgba(212, 175, 55, 0.07);
        }

        h1 {
            margin: 0;
            font-size: clamp(1.7rem, 3vw, 2.4rem);
            letter-spacing: 0.02em;
        }

        .subtitle {
            margin: 7px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .data-status {
            padding: 10px 15px;
            color: var(--gold-light);
            white-space: nowrap;
            border: 1px solid var(--panel-border);
            border-radius: 999px;
            background: rgba(212, 175, 55, 0.06);
            font-size: 0.85rem;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 24px;
        }

        .chart-card {
            min-width: 0;
            height: 570px;
            padding: 26px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            border-radius: 22px;
            background: var(--panel);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.34);
        }

        .chart-title {
            margin: 0 0 6px;
            font-size: 1.25rem;
        }

        .chart-description {
            margin: 0;
            color: var(--muted);
            font-size: 0.84rem;
        }

        .chart-container {
            position: relative;
            height: calc(100% - 62px);
            margin-top: 18px;
        }

        .empty-state {
            position: absolute;
            inset: 0;
            display: none;
            place-items: center;
            color: var(--muted);
        }

        .error {
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.3);
        }

        @media (max-width: 900px) {
            .dashboard-page {
                width: min(100% - 24px, 680px);
                padding-top: 20px;
            }

            .page-header {
                align-items: flex-start;
                margin-bottom: 20px;
            }

            .charts-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .chart-card {
                height: 430px;
                padding: 18px 14px;
                border-radius: 18px;
            }
        }

        @media (max-width: 520px) {
            .page-header {
                flex-direction: column;
                gap: 14px;
            }

            .data-status {
                margin-left: 62px;
            }

            .chart-card {
                height: 390px;
            }

            .chart-title {
                font-size: 1.08rem;
            }
        }
    </style>
</head>
<body>
<main class="dashboard-page">
    <header class="page-header">
        <div class="title-wrap">
            <a class="back-button" href="index.html" aria-label="返回客资管理主页">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </a>
            <div>
                <h1>仪表盘</h1>
                <p class="subtitle">销售业绩数据图解</p>
            </div>
        </div>
        <div class="data-status" id="data-status">正在读取实时数据…</div>
    </header>

    <section class="charts-grid" aria-label="销售业绩仪表盘">
        <article class="chart-card">
            <h2 class="chart-title">销售业绩分布</h2>
            <p class="chart-description">各负责人客资数量与占比</p>
            <div class="chart-container">
                <canvas id="salesPieChart" aria-label="销售业绩分布扇形图"></canvas>
                <div class="empty-state" id="pie-empty">暂无可展示的数据</div>
            </div>
        </article>

        <article class="chart-card">
            <h2 class="chart-title">销售业绩排名</h2>
            <p class="chart-description">按客资数量从高到低排列</p>
            <div class="chart-container">
                <canvas id="salesBarChart" aria-label="销售业绩排名柱状图"></canvas>
                <div class="empty-state" id="bar-empty">暂无可展示的数据</div>
            </div>
        </article>
    </section>
</main>

<script>
    const COLORS = ['#f2c879', '#d77de4', '#9fc5d1', '#91b875', '#e89374', '#7ca9e8', '#b9a58f', '#d986a5'];
    const OWNER_ALIAS_MAP = {
        '冰冰': '李冰冰',
        '李冰冰': '李冰冰',
        '冯玲': '冯玲',
        '郭楠': '郭楠',
        '张议丹': '张议丹',
        '丹丹': '张议丹',
        '徐俊强': '徐俊强'
    };

    if (typeof ChartDataLabels !== 'undefined') {
        Chart.register(ChartDataLabels);
    }

    function aggregateSales(records) {
        const totals = new Map();
        records.forEach(record => {
            const rawOwner = String(record.owner || '').trim();
            if (!rawOwner) return;
            const owner = OWNER_ALIAS_MAP[rawOwner] || rawOwner;
            totals.set(owner, (totals.get(owner) || 0) + 1);
        });
        return [...totals.entries()].sort((a, b) => b[1] - a[1]);
    }

    function renderCharts(records) {
        const sales = aggregateSales(records);
        const labels = sales.map(([name]) => name);
        const values = sales.map(([, value]) => value);
        const total = values.reduce((sum, value) => sum + value, 0);

        if (!sales.length) {
            document.getElementById('salesPieChart').style.display = 'none';
            document.getElementById('salesBarChart').style.display = 'none';
            document.getElementById('pie-empty').style.display = 'grid';
            document.getElementById('bar-empty').style.display = 'grid';
            return;
        }

        new Chart(document.getElementById('salesPieChart'), {
            type: 'pie',
            data: {
                labels,
                datasets: [{
                    data: values,
                    backgroundColor: COLORS.slice(0, labels.length),
                    borderColor: '#1c1917',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { top: 28, right: 36, bottom: 28, left: 36 } },
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: '#d6d3d1',
                            usePointStyle: true,
                            padding: 16,
                            font: { family: 'Noto Sans SC', size: 12 }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: context => ` ${context.label}：${context.raw} 单（${((context.raw / total) * 100).toFixed(1)}%）`
                        }
                    },
                    datalabels: {
                        color: '#fafaf9',
                        textStrokeColor: 'rgba(0, 0, 0, 0.65)',
                        textStrokeWidth: 3,
                        font: { family: 'Noto Sans SC', weight: '600', size: 12 },
                        formatter: (value, context) => {
                            const name = context.chart.data.labels[context.dataIndex];
                            return `${name}\n${value}单 · ${((value / total) * 100).toFixed(1)}%`;
                        }
                    }
                }
            }
        });

        new Chart(document.getElementById('salesBarChart'), {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: '客资数量',
                    data: values,
                    backgroundColor: 'rgba(242, 200, 121, 0.78)',
                    borderColor: '#f2c879',
                    borderWidth: 1,
                    borderRadius: 7,
                    maxBarThickness: 58
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { top: 28, right: 10 } },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: { label: context => ` 客资数量：${context.raw} 单` }
                    },
                    datalabels: {
                        anchor: 'end',
                        align: 'end',
                        color: '#f6d98b',
                        font: { family: 'Outfit', weight: '700', size: 14 },
                        formatter: value => `${value}`
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: {
                            color: '#d6d3d1',
                            font: { family: 'Noto Sans SC', size: 12 }
                        }
                    },
                    y: {
                        beginAtZero: true,
                        grace: '15%',
                        grid: { color: 'rgba(255, 255, 255, 0.07)' },
                        ticks: {
                            color: '#a8a29e',
                            precision: 0,
                            font: { family: 'Outfit', size: 11 }
                        }
                    }
                }
            }
        });
    }

    async function loadDashboard() {
        const status = document.getElementById('data-status');
        try {
            const response = await fetch('/api/data', { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            if (!result.success || !Array.isArray(result.records)) {
                throw new Error(result.error || '返回数据格式不正确');
            }
            renderCharts(result.records);
            status.textContent = `实时数据 · ${result.records.length} 条记录`;
        } catch (error) {
            console.error('仪表盘数据读取失败：', error);
            status.textContent = '数据读取失败，请稍后刷新';
            status.classList.add('error');
        }
    }

    loadDashboard();
</script>
</body>
</html>
